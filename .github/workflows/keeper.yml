name: Settlement Keeper

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  keeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: cre-workflow

      - name: Run keeper
        run: npx tsx scripts/keeper.ts
        working-directory: cre-workflow
        env:
          PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          RPC_URL: https://sepolia.base.org
          POSITION_BOOK_ADDRESS: ${{ vars.POSITION_BOOK_ADDRESS }}
          SETTLEMENT_MANAGER_ADDRESS: ${{ vars.SETTLEMENT_MANAGER_ADDRESS }}
